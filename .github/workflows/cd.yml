name: CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker images
      run: |
        docker compose build
        docker tag schoolms-api ${{ secrets.DOCKER_USERNAME }}/schoolms-api:latest
        docker tag schoolms-frontend ${{ secrets.DOCKER_USERNAME }}/schoolms-frontend:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/schoolms-api:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/schoolms-frontend:latest

    # Add deployment steps here (e.g., to Azure, AWS, etc.)